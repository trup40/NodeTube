<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NodeTube | Özgür Müzik</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div id="preparing-popup">
        <i class="fas fa-compact-disc"></i>
        <h2 id="ui-prep-title"></h2>
        <p id="ui-prep-desc"></p>
    </div>

    <div id="playlist-resolve-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this) closeResolveModal()">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3 id="resolve-modal-title" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%;"></h3>
                <button class="close-modal-btn" onclick="closeResolveModal()"><i class="fas fa-times"></i></button>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-shrink: 0;">
                <button class="tab-btn active" onclick="playResolvedAll()" style="flex: 1;" id="ui-res-playall"></button>
                <button class="tab-btn" onclick="saveResolvedAll()" style="flex: 1;" id="ui-res-saveall"></button>
            </div>
            <div id="resolve-modal-list" style="overflow-y: auto; max-height: 50vh; display: flex; flex-direction: column; gap: 8px; padding-right: 5px;"></div>
        </div>
    </div>

    <div id="fav-modal" class="modal-overlay" onclick="if(event.target===this) closeFavModal()">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="ui-modal-title"></h3>
                <button class="close-modal-btn" onclick="closeFavModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="modal-playlist-options"></div>
            <div class="new-playlist-row">
                <input type="text" id="new-playlist-name">
                <button onclick="createNewPlaylistFromModal()"><i class="fas fa-plus"></i></button>
            </div>
        </div>
    </div>

    <div id="input-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this) closeInputModal()">
        <div class="modal-content" style="max-width: 350px;">
            <h3 id="input-modal-title" style="margin-bottom:15px; font-size:18px; color:var(--text-main);"></h3>
            <input type="text" id="input-modal-value" style="width:100%; padding:12px 15px; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:var(--text-main); font-family:'Exo 2', sans-serif; outline:none; margin-bottom:20px; font-size:15px;">
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="closeInputModal()" class="tab-btn" id="ui-input-cancel"></button>
                <button id="ui-input-ok" class="tab-btn active"></button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this) closeConfirmModal()">
        <div class="modal-content" style="max-width: 350px;">
            <p id="confirm-modal-msg" style="margin-bottom:20px; font-size:16px; color:var(--text-main); line-height:1.5; font-weight:600;"></p>
            <div style="display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="closeConfirmModal()" class="tab-btn" id="ui-confirm-no"></button>
                <button id="ui-confirm-yes" class="tab-btn" style="background:var(--heart); border-color:var(--heart); color:white;"></button>
            </div>
        </div>
    </div>

    <header>
        <div class="header-top">
            <div class="brand" onclick="resetApp()">
                <img src="/favicon.svg" alt="NodeTube Logo">
                <div class="brand-text">
                    <h1>NodeTube</h1>
                    <span>by trup40 (Eagle)</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="langToggleBtn" onclick="toggleLang()"></button>
                <button class="header-btn" id="viewToggleBtn" onclick="toggleViewMode()"><i class="fas fa-th"></i></button>
                <button class="header-btn" id="favViewBtn" onclick="toggleFavoritesView()"><i class="fas fa-heart"></i></button>
                <button class="header-btn" id="themeToggleBtn" onclick="toggleTheme()"><i class="fas fa-sun"></i></button>
            </div>
        </div>
        <div class="search-container">
            <div class="search-box-wrapper">
                <input type="text" id="searchInput" onkeypress="if(event.key === 'Enter') startNewSearch()" oninput="toggleClearBtn()">
                <button id="clearInputBtn" onclick="clearSearch()"><i class="fas fa-times"></i></button>
            </div>
            <button class="main-btn" id="searchBtn" onclick="startNewSearch()"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <div id="playlist-header" class="playlist-header" style="display:none;">
        <button class="tab-btn" onclick="promptNewPlaylist()" style="padding: 8px 12px; flex-shrink: 0;"><i class="fas fa-plus"></i></button>
        <div id="playlist-tabs-container" class="playlist-tabs-container"></div>
    </div>
    
    <div id="playlist-actions" class="playlist-actions" style="display:none;"></div>

    <div id="results" class="grid-view">
        <div id="empty-state">
            <i class="fas fa-headphones"></i>
            <h3 id="ui-empty-title"></h3>
            <p id="ui-empty-desc"></p>
        </div>
    </div>
    
    <div class="load-more-area"><button id="loadMoreBtn" onclick="fetchPage()"><i class="fas fa-chevron-down"></i> <span id="ui-load"></span></button></div>

    <div id="player-wrapper">
        <div id="now-playing"></div>
        <div class="player-controls">
            <div class="mobile-buttons">
                <div class="play-btns">
                    <button class="icon-btn" id="prevBtn" onclick="playPrevious()"><i class="fas fa-step-backward"></i></button>
                    <button id="playBtn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                    <button class="icon-btn" id="nextBtn" onclick="playNext()"><i class="fas fa-step-forward"></i></button>
                </div>
                <div class="mobile-separator"></div>
                <div class="action-btns">
                    <div class="volume-container" id="volumeContainer">
                        <button class="icon-btn" id="volumeBtn" onclick="handleVolumeClick()"><i class="fas fa-volume-up" id="volumeIcon"></i></button>
                        <div class="volume-slider-wrapper">
                            <input type="range" id="volumeBar" min="0" max="1" step="0.05" value="1" oninput="changeVolume(this.value)">
                        </div>
                    </div>
                    <button class="icon-btn" id="shuffleBtn" onclick="toggleShuffle()"><i class="fas fa-random"></i></button>
                    <button class="icon-btn" id="loopBtn" onclick="toggleLoop()"><i class="fas fa-redo"></i></button>
                    <button class="icon-btn" id="downloadBtn" onclick="downloadCurrent()"><i class="fas fa-download"></i></button>
                    <button class="icon-btn" id="playerFavBtn" onclick="togglePlayerFavorite()"><i class="far fa-heart"></i></button>
                </div>
            </div>
            <div class="progress-row">
                <span class="time-display" id="currentTime">0:00</span>
                <input type="range" id="progressBar" value="0" step="0.1">
                <span class="time-display" id="durationTime">0:00</span>
            </div>
        </div>
        <audio id="mainAudio" preload="metadata"></audio>
    </div>

    <script src="/i18n.js"></script>
    <script src="/nodetube.js"></script>
</body>
</html>
