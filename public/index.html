<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NodeTube | Özgür Müzik</title>
	<link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a; --surface: #1e293b; --surface-hover: #334155;
            --primary: #10b981; --primary-hover: #059669; --text-main: #f8fafc;
            --text-muted: #94a3b8; --border: #334155; --heart: #ef4444;
            --header-bg: rgba(15, 23, 42, 0.85); --player-bg: rgba(15, 23, 42, 0.95);
            --popup-bg: rgba(30, 41, 59, 0.95); --input-bg: rgba(30, 41, 59, 0.8);
            --icon-color: #f8fafc;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9; --surface: #ffffff; --surface-hover: #e2e8f0;
            --primary: #10b981; --primary-hover: #059669; --text-main: #0f172a;
            --text-muted: #64748b; --border: #cbd5e1; --heart: #dc2626;
            --header-bg: rgba(241, 245, 249, 0.85); --player-bg: rgba(255, 255, 255, 0.95);
            --popup-bg: rgba(255, 255, 255, 0.98); --input-bg: rgba(255, 255, 255, 0.8);
            --icon-color: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: thin; scrollbar-color: var(--text-muted) var(--bg-color); }
        
        body { font-family: 'Exo 2', system-ui, sans-serif; background: linear-gradient(135deg, var(--bg-color) 0%, var(--surface-hover) 100%); color: var(--text-main); min-height: 100vh; padding-bottom: 160px; transition: background 0.3s, color 0.3s; overflow-x: hidden; }

        ::selection { background: var(--primary); color: white; }
        ::-moz-selection { background: var(--primary); color: white; }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; border: 2px solid var(--bg-color); }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        #preparing-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--popup-bg); padding: 30px 40px; border-radius: 16px; box-shadow: 0 15px 50px rgba(0,0,0,0.4); border: 1px solid var(--border); z-index: 100; display: none; flex-direction: column; align-items: center; backdrop-filter: blur(10px); transition: opacity 0.3s; text-align: center; }
        #preparing-popup i { font-size: 40px; color: var(--primary); margin-bottom: 15px; animation: spin 1.5s linear infinite; }
        #preparing-popup h2 { font-size: 20px; margin-bottom: 8px; color: var(--text-main); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        header { padding: 25px 20px; background: var(--header-bg); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; transition: 0.3s; }
        .header-top { display: flex; align-items: center; justify-content: space-between; max-width: 800px; margin: 0 auto 20px auto; }
        header h1 { font-size: 26px; font-weight: 800; letter-spacing: 1px; color: var(--primary); cursor: pointer; margin: 0; flex-shrink: 0; }
        
        .header-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .header-btn { background: none; border: none; font-size: 18px; color: var(--text-main); cursor: pointer; transition: 0.2s; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Exo 2', sans-serif; font-weight: bold; }
        .header-btn:hover { background: rgba(100,116,139,0.1); color: var(--primary); }
        .header-btn.active-fav { color: var(--heart); }

        .search-container { position: relative; max-width: 600px; margin: 0 auto; display: flex; gap: 10px; }
        .search-box-wrapper { position: relative; flex: 1; display: flex; align-items: center; }
        input[type="text"] { font-family: 'Exo 2', system-ui, sans-serif; width: 100%; padding: 12px 45px 12px 18px; border-radius: 12px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-main); font-size: 15px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(16, 185, 129, 0.15); }
        
        #clearInputBtn { position: absolute; right: 12px; color: var(--text-muted); cursor: pointer; display: none; background: none; border: none; font-size: 16px; padding: 5px; }
        #clearInputBtn:hover { color: var(--heart); }
        button.main-btn { flex-shrink: 0; padding: 12px 25px; border-radius: 12px; border: none; background: linear-gradient(to bottom right, var(--primary), var(--primary-hover)); color: white; cursor: pointer; transition: 0.3s; font-size: 16px; }

        @media (max-width: 600px) {
            .header-top { flex-direction: column; gap: 15px; justify-content: center; }
            .header-actions { justify-content: center; width: 100%; }
            .search-container { flex-direction: column; }
            button.main-btn { width: 100%; }
        }

        #results { display: grid; gap: 20px; max-width: 1300px; margin: 25px auto; padding: 0 20px; transition: 0.3s; }
        
        #results.grid-view { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        #results.grid-view .card { flex-direction: column; }
        #results.grid-view .card img { width: 100%; aspect-ratio: 16/9; margin-bottom: 12px; }

        #results.list-view { grid-template-columns: 1fr; }
        #results.list-view .card { flex-direction: row; align-items: center; gap: 20px; padding: 10px 20px; }
        #results.list-view .card img { width: 120px; height: 68px; margin-bottom: 0; flex-shrink: 0; }
        #results.list-view .card h4 { -webkit-line-clamp: 1; margin-bottom: 4px; font-size: 16px; }

        .card { background: var(--surface); border-radius: 12px; padding: 12px; cursor: pointer; transition: 0.2s; border: 1px solid var(--border); display: flex; position: relative; }
        .card.playing { border-color: var(--primary); background: var(--surface-hover); box-shadow: 0 0 10px rgba(16,185,129,0.2); }
        .card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .card img { border-radius: 8px; object-fit: cover; }
        .card .info { flex: 1; min-width: 0; }
        .card h4 { font-size: 15px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--text-main); }
        .card p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        .card-fav-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; z-index: 5; }
        .card-fav-btn.loved { color: var(--heart); }
        
        #results.list-view .card-fav-btn { position: static; background: transparent; color: var(--text-muted); width: 45px; height: 45px; font-size: 22px; margin-left: auto; border-radius: 50%; flex-shrink: 0; }
        #results.list-view .card-fav-btn:hover { background: rgba(128,128,128,0.15); }
        #results.list-view .card-fav-btn.loved { color: var(--heart); }

        .fav-order-badge { position: absolute; top: 10px; left: 10px; z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(15, 23, 42, 0.75); border-radius: 8px; border: 1px solid var(--border); backdrop-filter: blur(5px); overflow: hidden; transition: 0.2s; }
        .fav-order-badge button { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 3px 10px; font-size: 16px; transition: 0.2s; }
        .fav-order-badge button:hover:not(:disabled) { color: var(--primary); background: rgba(255,255,255,0.1); }
        .fav-order-badge button:disabled { opacity: 0.2; cursor: not-allowed; }
        .fav-order-badge span { color: white; font-weight: 800; font-size: 14px; padding: 0 10px; pointer-events: none; }
        
        [data-theme="light"] .fav-order-badge { background: rgba(255, 255, 255, 0.85); }
        [data-theme="light"] .fav-order-badge span { color: var(--text-main); }

        #results.list-view .fav-order-badge { position: static; flex-direction: column; margin-right: 5px; flex-shrink: 0; background: transparent; border: none; backdrop-filter: none; }

        @media (max-width: 600px) {
            #results { padding: 0 10px; }
            #results.list-view .card { padding: 12px 10px; gap: 10px; min-height: 85px; }
            #results.list-view .card img { width: 100px; height: 56px; min-width: 100px; }
            #results.list-view .card h4 { font-size: 14px; margin-bottom: 5px; }
            #results.list-view .card p { font-size: 12px; }
            #results.list-view .card-fav-btn { width: 32px; height: 32px; min-width: 32px; font-size: 18px; margin-left: auto; margin-right: 0; padding: 0; }
            #results.list-view .fav-order-badge { margin-right: 5px; }
            .fav-order-badge button { padding: 4px 6px; font-size: 16px; }
            .fav-order-badge span { font-size: 13px; padding: 0 3px; }
        }

        .load-more-area { text-align: center; margin: 30px 0; }
        #loadMoreBtn { font-family: 'Exo 2', sans-serif; background: transparent; border: 2px solid var(--primary); color: var(--primary); display: none; padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        #empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); grid-column: 1 / -1; }
        #empty-state i { font-size: 45px; margin-bottom: 15px; opacity: 0.4; }

        #player-wrapper { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--player-bg); padding: 15px 20px; border-top: 1px solid var(--border); backdrop-filter: blur(20px); z-index: 50; }
        #now-playing { text-align:center; margin-bottom:8px; color:var(--primary); font-weight:600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 800px; margin: 0 auto 8px auto; }
        
        .player-controls { display: flex; align-items: center; justify-content: space-between; max-width: 1000px; margin: 0 auto; width: 100%; gap: 15px; }
        .mobile-buttons { display: contents; }
        
        .play-btns { display: flex; align-items: center; justify-content: flex-start; gap: 10px; flex-shrink: 0; width: 150px; order: 1; }
        .progress-row { display: flex; align-items: center; gap: 15px; flex: 1; padding: 0 10px; min-width: 200px; justify-content: center; order: 2; }
        .action-btns { display: flex; align-items: center; justify-content: flex-end; gap: 10px; flex-shrink: 0; width: 150px; order: 3; }
        
        .mobile-separator { display: none; }

        .icon-btn { flex-shrink: 0; background: none; border: none; color: var(--icon-color); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; min-width: 40px; min-height: 40px; border-radius: 50%; transition: 0.2s; font-size: 16px; }
        .icon-btn:hover { background: rgba(100,116,139,0.1); }
        .icon-btn.active { color: #fff; background: var(--primary); box-shadow: 0 0 12px rgba(16, 185, 129, 0.5); }
        .icon-btn.loved { color: var(--heart); }
        
        #playBtn { flex-shrink: 0; width: 50px; height: 50px; min-width: 50px; min-height: 50px; font-size: 18px; background: var(--primary); color: white; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; border: none;}
        #playBtn:hover { transform: scale(1.05); }

        input[type="range"] { flex: 1; cursor: pointer; accent-color: var(--primary); height: 5px; }
        .time-display { font-size: 12px; color: var(--text-muted); min-width: 40px; text-align: center; font-variant-numeric: tabular-nums; }
        
        @media (max-width: 768px) {
            .player-controls { flex-direction: column; gap: 10px; justify-content: center; }
            .progress-row { order: 1; flex: 1 1 100%; width: 100%; padding: 0; margin-bottom: 5px; min-width: unset; }
            .mobile-buttons { display: flex; order: 2; justify-content: center; width: 100%; gap: 10px; align-items: center; flex-wrap: nowrap; }
            .play-btns { width: auto; gap: 10px; padding: 0; justify-content: center; order: unset; }
            .action-btns { width: auto; gap: 10px; padding: 0; justify-content: center; order: unset; }
            .mobile-separator { display: block; width: 2px; height: 24px; background: var(--border); border-radius: 2px; margin: 0; opacity: 0.5; flex-shrink: 0; order: unset; }
            
            .icon-btn { width: 38px; height: 38px; min-width: 38px; min-height: 38px; font-size: 15px; }
            #playBtn { width: 46px; height: 46px; min-width: 46px; min-height: 46px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="preparing-popup">
        <i class="fas fa-compact-disc"></i>
        <h2 id="ui-prep-title">Bağlantı Kuruluyor</h2>
        <p id="ui-prep-desc" style="color: var(--text-muted); font-size: 14px;">NodeTube optimize ediliyor...</p>
    </div>

    <header>
        <div class="header-top">
            <h1 onclick="resetApp()">NodeTube</h1>
            <div class="header-actions">
                <button class="header-btn" id="langToggleBtn" onclick="toggleLang()"></button>
                <button class="header-btn" id="viewToggleBtn" onclick="toggleViewMode()"><i class="fas fa-th"></i></button>
                <button class="header-btn" id="favViewBtn" onclick="toggleFavoritesView()"><i class="fas fa-heart"></i></button>
                <button class="header-btn" id="themeToggleBtn" onclick="toggleTheme()"><i class="fas fa-sun"></i></button>
            </div>
        </div>
        <div class="search-container">
            <div class="search-box-wrapper">
                <input type="text" id="searchInput" onkeypress="if(event.key === 'Enter') startNewSearch()" oninput="toggleClearBtn()">
                <button id="clearInputBtn" onclick="clearSearch()"><i class="fas fa-times"></i></button>
            </div>
            <button class="main-btn" id="searchBtn" onclick="startNewSearch()"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <div id="results" class="grid-view">
        <div id="empty-state">
            <i class="fas fa-headphones"></i>
            <h3 id="ui-empty-title"></h3>
            <p id="ui-empty-desc"></p>
        </div>
    </div>
    
    <div class="load-more-area"><button id="loadMoreBtn" onclick="fetchPage()"><i class="fas fa-chevron-down"></i> <span id="ui-load"></span></button></div>

    <div id="player-wrapper">
        <div id="now-playing"></div>
        <div class="player-controls">
            
            <div class="mobile-buttons">
                <div class="play-btns">
                    <button class="icon-btn" id="prevBtn" onclick="playPrevious()"><i class="fas fa-step-backward"></i></button>
                    <button id="playBtn" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                    <button class="icon-btn" id="nextBtn" onclick="playNext()"><i class="fas fa-step-forward"></i></button>
                </div>
                
                <div class="mobile-separator"></div>

                <div class="action-btns">
                    <button class="icon-btn" id="loopBtn" onclick="toggleLoop()"><i class="fas fa-redo"></i></button>
                    <button class="icon-btn" id="downloadBtn" onclick="downloadCurrent()"><i class="fas fa-download"></i></button>
                    <button class="icon-btn" id="playerFavBtn" onclick="togglePlayerFavorite()"><i class="far fa-heart"></i></button>
                </div>
            </div>

            <div class="progress-row">
                <span class="time-display" id="currentTime">0:00</span>
                <input type="range" id="progressBar" value="0" step="0.1">
                <span class="time-display" id="durationTime">0:00</span>
            </div>

        </div>
        <audio id="mainAudio" preload="metadata"></audio>
    </div>

    <script>
        const i18n = {
            tr: {
                pageTitle: "NodeTube | Özgür Müzik", search: "Şarkı, sanatçı ara...", loadMore: "DAHA YÜKLE",
                emptyTitle: "Müzik Keşfine Başla", emptyDesc: "Favorilerini ekle veya yeni şarkılar ara.",
                favTitle: "Henüz favorin yok", favDesc: "Arama sonuçlarındaki kalp ikonuna tıklayarak ilk şarkını ekle.",
                prepTitle: "Bağlantı Kuruluyor", prepDesc: "NodeTube optimize ediliyor...",
                wait: "Müzik bekleniyor...", prep: "Hazırlanıyor", play: "Çalıyor",
                searching: "Aranıyor...", error: "Arama hatası.",
                ttLang: "Dili Değiştir (İngilizce)", ttView: "Görünümü Değiştir", ttFavs: "Favorilerim", ttTheme: "Tema Değiştir",
                ttClear: "Temizle", ttSearch: "Ara", ttOrderUp: "Yukarı Taşı", ttOrderDown: "Aşağı Taşı",
                ttPrev: "Önceki Şarkı", ttPlay: "Oynat / Duraklat", ttNext: "Sonraki Şarkı",
                ttLoop: "Sürekli Tekrar", ttDownload: "M4A Olarak İndir", ttFavToggle: "Favorilere Ekle / Çıkar"
            },
            en: {
                pageTitle: "NodeTube | Free Music", search: "Search songs, artists...", loadMore: "LOAD MORE",
                emptyTitle: "Start Exploring Music", emptyDesc: "Add favorites or search for new songs.",
                favTitle: "No favorites yet", favDesc: "Click the heart icon in search results to add your first song.",
                prepTitle: "Connecting", prepDesc: "Optimizing NodeTube...",
                wait: "Waiting for music...", prep: "Preparing", play: "Playing",
                searching: "Searching...", error: "Search error.",
                ttLang: "Change Language (Turkish)", ttView: "Toggle View", ttFavs: "My Favorites", ttTheme: "Toggle Theme",
                ttClear: "Clear", ttSearch: "Search", ttOrderUp: "Move Up", ttOrderDown: "Move Down",
                ttPrev: "Previous Track", ttPlay: "Play / Pause", ttNext: "Next Track",
                ttLoop: "Toggle Loop", ttDownload: "Download as M4A", ttFavToggle: "Toggle Favorite"
            }
        };

        let lang = localStorage.getItem('nodeTubeLang') || 'tr';
        
        function applyLanguage() {
            document.getElementById('langToggleBtn').innerText = lang === 'tr' ? 'EN' : 'TR';
            document.getElementById('searchInput').placeholder = i18n[lang].search;
            document.getElementById('ui-prep-title').innerText = i18n[lang].prepTitle;
            document.getElementById('ui-prep-desc').innerText = i18n[lang].prepDesc;
            document.getElementById('ui-load').innerText = i18n[lang].loadMore;
            
            document.getElementById('langToggleBtn').title = i18n[lang].ttLang;
            document.getElementById('viewToggleBtn').title = i18n[lang].ttView;
            document.getElementById('favViewBtn').title = i18n[lang].ttFavs;
            document.getElementById('themeToggleBtn').title = i18n[lang].ttTheme;
            document.getElementById('clearInputBtn').title = i18n[lang].ttClear;
            document.getElementById('searchBtn').title = i18n[lang].ttSearch;
            document.getElementById('prevBtn').title = i18n[lang].ttPrev;
            document.getElementById('playBtn').title = i18n[lang].ttPlay;
            document.getElementById('nextBtn').title = i18n[lang].ttNext;
            document.getElementById('loopBtn').title = i18n[lang].ttLoop;
            document.getElementById('downloadBtn').title = i18n[lang].ttDownload;
            document.getElementById('playerFavBtn').title = i18n[lang].ttFavToggle;
            
            document.querySelectorAll('.card-fav-btn').forEach(btn => btn.title = i18n[lang].ttFavToggle);
            document.querySelectorAll('.fav-up').forEach(btn => btn.title = i18n[lang].ttOrderUp);
            document.querySelectorAll('.fav-down').forEach(btn => btn.title = i18n[lang].ttOrderDown);
            
            updateEmptyState();
            const np = document.getElementById('now-playing');
            if(audio.src === "") { np.innerText = i18n[lang].wait; document.title = i18n[lang].pageTitle; } 
            else if(currentQueueIndex !== -1) {
                np.innerText = `${audio.paused ? i18n[lang].prep : i18n[lang].play}: ${globalQueue[currentQueueIndex].title}`;
                document.title = `▶ ${globalQueue[currentQueueIndex].title} | NodeTube`;
            }
        }

        function toggleLang() { lang = lang === 'tr' ? 'en' : 'tr'; localStorage.setItem('nodeTubeLang', lang); applyLanguage(); }

        function updateEmptyState() {
            const container = document.getElementById('results');
            if(container.innerHTML.includes('id="empty-state"')) {
                if(isFavViewActive) container.innerHTML = `<div id="empty-state"><i class="far fa-heart"></i><h3>${i18n[lang].favTitle}</h3><p>${i18n[lang].favDesc}</p></div>`;
                else container.innerHTML = `<div id="empty-state"><i class="fas fa-headphones"></i><h3 id="ui-empty-title">${i18n[lang].emptyTitle}</h3><p id="ui-empty-desc">${i18n[lang].emptyDesc}</p></div>`;
            }
        }

        let currentQuery = ''; let currentPage = 1;
        let searchVideos = []; let searchHasMore = false; 
        let favoritesList = JSON.parse(localStorage.getItem('nodeTubeFavs')) || [];
        let isFavViewActive = false; 
        let viewMode = localStorage.getItem('nodeTubeView') || 'grid'; 
        let globalQueue = []; let currentQueueIndex = -1;

        const audio = document.getElementById('mainAudio');
        const resultsDiv = document.getElementById('results');
        const viewBtnIcon = document.getElementById('viewToggleBtn').querySelector('i');

        window.onload = () => {
            if(viewMode === 'list') { resultsDiv.classList.replace('grid-view', 'list-view'); viewBtnIcon.className = 'fas fa-list'; }
            applyLanguage();
        };

        function toggleViewMode() {
            if (viewMode === 'grid') { viewMode = 'list'; resultsDiv.classList.replace('grid-view', 'list-view'); viewBtnIcon.className = 'fas fa-list'; } 
            else { viewMode = 'grid'; resultsDiv.classList.replace('list-view', 'grid-view'); viewBtnIcon.className = 'fas fa-th'; }
            localStorage.setItem('nodeTubeView', viewMode);
        }

        function toggleClearBtn() { document.getElementById('clearInputBtn').style.display = document.getElementById('searchInput').value ? 'block' : 'none'; }
        function clearSearch() {
            document.getElementById('searchInput').value = ''; toggleClearBtn();
            searchVideos = []; searchHasMore = false;
            if(!isFavViewActive) resetApp(); else document.getElementById('loadMoreBtn').style.display = 'none';
        }

        function resetApp() {
            searchVideos = [];
            resultsDiv.innerHTML = `<div id="empty-state"><i class="fas fa-headphones"></i><h3 id="ui-empty-title">${i18n[lang].emptyTitle}</h3><p id="ui-empty-desc">${i18n[lang].emptyDesc}</p></div>`;
            document.getElementById('loadMoreBtn').style.display = 'none'; document.title = i18n[lang].pageTitle;
        }

        function saveFavorites() { localStorage.setItem('nodeTubeFavs', JSON.stringify(favoritesList)); }
        function checkIsFav(id) { return favoritesList.some(f => f.id === id); }

        function toggleFavoritesView() {
            isFavViewActive = !isFavViewActive;
            const favBtn = document.getElementById('favViewBtn'); const loadBtn = document.getElementById('loadMoreBtn');
            if (isFavViewActive) {
                favBtn.classList.add('active-fav'); loadBtn.style.display = 'none';
                if(favoritesList.length===0) resultsDiv.innerHTML = `<div id="empty-state"><i class="far fa-heart"></i><h3>${i18n[lang].favTitle}</h3><p>${i18n[lang].favDesc}</p></div>`;
                else renderCards(favoritesList);
            } else {
                favBtn.classList.remove('active-fav');
                if(searchVideos.length > 0) { renderCards(searchVideos); loadBtn.style.display = searchHasMore ? 'inline-block' : 'none'; } 
                else resetApp();
            }
        }

        async function startNewSearch() {
            const q = document.getElementById('searchInput').value; if(!q) return;
            isFavViewActive = false; document.getElementById('favViewBtn').classList.remove('active-fav');
            currentQuery = q; currentPage = 1; searchVideos = [];
            resultsDiv.innerHTML = `<p style="text-align:center; padding-top:50px;"><i class="fas fa-spinner fa-spin"></i> ${i18n[lang].searching}</p>`;
            await fetchPage(true);
        }

        async function fetchPage(isNew = false) {
            const loadBtn = document.getElementById('loadMoreBtn');
            if(!isNew) { document.getElementById('ui-load').innerText = i18n[lang].searching; currentPage++; }
            try {
                const res = await fetch(`/search?q=${encodeURIComponent(currentQuery)}&page=${currentPage}`);
                const data = await res.json();
                if(isNew) searchVideos = []; data.videos.forEach(v => searchVideos.push(v)); searchHasMore = data.hasMore;
                if(!isFavViewActive) {
                    renderCards(searchVideos);
                    loadBtn.style.display = searchHasMore ? 'inline-block' : 'none';
                    document.getElementById('ui-load').innerText = i18n[lang].loadMore;
                }
            } catch (e) { if(!isFavViewActive) resultsDiv.innerHTML = `<p style="text-align:center; color:var(--heart);">${i18n[lang].error}</p>`; }
        }

        function moveFav(index, direction, event) {
            event.stopPropagation();
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= favoritesList.length) return;

            const temp = favoritesList[index];
            favoritesList[index] = favoritesList[newIndex];
            favoritesList[newIndex] = temp;
            saveFavorites();

            if (isFavViewActive && currentQueueIndex !== -1) {
                const playingId = globalQueue[currentQueueIndex].id;
                globalQueue = [...favoritesList];
                currentQueueIndex = globalQueue.findIndex(v => v.id === playingId);
            }
            renderCards(favoritesList);
        }

        function renderCards(list) {
            resultsDiv.innerHTML = ''; const context = isFavViewActive ? 'fav' : 'search';
            list.forEach((v, idx) => {
                const isFav = checkIsFav(v.id); const safeVideoStr = encodeURIComponent(JSON.stringify(v));
                const card = document.createElement('div'); card.className = 'card'; card.id = `card-${v.id}`;
                card.onclick = () => playWithContext(idx, context);
                
                let orderBadgeHtml = '';
                if (context === 'fav') {
                    orderBadgeHtml = `
                        <div class="fav-order-badge" onclick="event.stopPropagation()">
                            <button class="fav-up" onclick="moveFav(${idx}, -1, event)" ${idx === 0 ? 'disabled' : ''} title="${i18n[lang].ttOrderUp}"><i class="fas fa-caret-up"></i></button>
                            <span>${idx + 1}</span>
                            <button class="fav-down" onclick="moveFav(${idx}, 1, event)" ${idx === list.length - 1 ? 'disabled' : ''} title="${i18n[lang].ttOrderDown}"><i class="fas fa-caret-down"></i></button>
                        </div>
                    `;
                }

                card.innerHTML = `
                    ${orderBadgeHtml}
                    <button class="card-fav-btn ${isFav ? 'loved' : ''}" data-id="${v.id}" onclick="toggleFav(event, ${idx}, '${context}')" title="${i18n[lang].ttFavToggle}">
                        <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
                    </button>
                    <img src="${v.thumbnail}" loading="lazy">
                    <div class="info">
                        <h4>${v.title}</h4>
                        <p>${v.author} • ${v.duration}</p>
                    </div>
                `;
                resultsDiv.appendChild(card);
            });
            highlightCard();
        }

        function playWithContext(index, context) { globalQueue = (context === 'fav') ? [...favoritesList] : [...searchVideos]; startStream(index); }

        function startStream(index) {
            if(index < 0 || index >= globalQueue.length) return;
            currentQueueIndex = index; const video = globalQueue[index];
            audio.pause(); audio.removeAttribute('src'); audio.load();
            
            const popup = document.getElementById('preparing-popup');
            popup.style.display = 'flex'; setTimeout(() => popup.style.opacity = '1', 10);
            
            document.getElementById('now-playing').innerText = `${i18n[lang].prep}: ${video.title}`;
            document.title = `▶ ${video.title} | NodeTube`;

            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({ title: video.title, artist: video.author, artwork: [{ src: video.thumbnail, sizes: '512x512', type: 'image/jpeg' }] });
                navigator.mediaSession.setActionHandler('previoustrack', playPrevious); navigator.mediaSession.setActionHandler('nexttrack', playNext);
            }

            audio.src = `/stream?id=${video.id}`; audio.play().catch(() => {});
            audio.onplaying = () => {
                popup.style.opacity = '0'; setTimeout(() => popup.style.display = 'none', 300);
                document.getElementById('now-playing').innerText = `${i18n[lang].play}: ${video.title}`;
                document.getElementById('playBtn').querySelector('i').className = 'fas fa-pause';
                highlightCard(); updatePlayerHeart();
            };
        }

        function playNext() { if(currentQueueIndex < globalQueue.length - 1) startStream(currentQueueIndex + 1); }
        function playPrevious() { if(currentQueueIndex > 0) startStream(currentQueueIndex - 1); }

        function toggleFav(e, idx, context) {
            e.stopPropagation(); const list = (context === 'fav') ? favoritesList : searchVideos; const video = list[idx];
            if(checkIsFav(video.id)) favoritesList = favoritesList.filter(f => f.id !== video.id); else favoritesList.push(video);
            saveFavorites();
            
            if(isFavViewActive) {
                if(favoritesList.length===0) resultsDiv.innerHTML = `<div id="empty-state"><i class="far fa-heart"></i><h3>${i18n[lang].favTitle}</h3><p>${i18n[lang].favDesc}</p></div>`;
                else renderCards(favoritesList);
            } else {
                const btn = e.currentTarget; btn.classList.toggle('loved');
                btn.querySelector('i').className = checkIsFav(video.id) ? 'fas fa-heart' : 'far fa-heart';
            }
            updatePlayerHeart();
        }

        function updatePlayerHeart() {
            if(currentQueueIndex === -1) return;
            const isFav = checkIsFav(globalQueue[currentQueueIndex].id);
            document.getElementById('playerFavBtn').classList.toggle('loved', isFav);
            document.getElementById('playerFavBtn').querySelector('i').className = isFav ? 'fas fa-heart' : 'far fa-heart';
        }

        function togglePlayerFavorite() {
            if(currentQueueIndex === -1) return;
            const video = globalQueue[currentQueueIndex];
            if(checkIsFav(video.id)) favoritesList = favoritesList.filter(f => f.id !== video.id); else favoritesList.push(video);
            saveFavorites();
            if(isFavViewActive) {
                if(favoritesList.length===0) resultsDiv.innerHTML = `<div id="empty-state"><i class="far fa-heart"></i><h3>${i18n[lang].favTitle}</h3><p>${i18n[lang].favDesc}</p></div>`;
                else renderCards(favoritesList);
            }
            updatePlayerHeart(); highlightCard();
            if(!isFavViewActive) renderCards(searchVideos);
        }

        function highlightCard() {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('playing'));
            if(currentQueueIndex === -1) return;
            const card = document.getElementById(`card-${globalQueue[currentQueueIndex].id}`);
            if(card) card.classList.add('playing');
        }

        function togglePlay() { 
            if(!audio.src) return;
            if(audio.paused) { audio.play(); document.getElementById('playBtn').querySelector('i').className = 'fas fa-pause'; }
            else { audio.pause(); document.getElementById('playBtn').querySelector('i').className = 'fas fa-play'; }
        }
        function toggleLoop() { audio.loop = !audio.loop; document.getElementById('loopBtn').classList.toggle('active', audio.loop); }
        function formatTime(s) { if(isNaN(s)) return "0:00"; const m=Math.floor(s/60), sc=Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }
        
        audio.ontimeupdate = () => { if(audio.duration) { document.getElementById('progressBar').value = (audio.currentTime/audio.duration)*100; document.getElementById('currentTime').innerText = formatTime(audio.currentTime); } };
        audio.onloadedmetadata = () => document.getElementById('durationTime').innerText = formatTime(audio.duration);
        document.getElementById('progressBar').oninput = e => { if(audio.duration) audio.currentTime = (e.target.value/100)*audio.duration; };
        audio.onended = () => { if(!audio.loop) playNext(); };

        function downloadCurrent() {
            if(currentQueueIndex === -1) return;
            window.location.href = `/download?id=${globalQueue[currentQueueIndex].id}&t=${btoa(unescape(encodeURIComponent(globalQueue[currentQueueIndex].title)))}`;
        }

        function toggleTheme() {
            const r = document.documentElement; const isL = r.getAttribute('data-theme') === 'light';
            r.setAttribute('data-theme', isL ? 'dark' : 'light');
            document.getElementById('themeToggleBtn').querySelector('i').className = isL ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('nodeTubeTheme', isL ? 'dark' : 'light');
        }
        if(localStorage.getItem('nodeTubeTheme') === 'light') { document.documentElement.setAttribute('data-theme', 'light'); document.getElementById('themeToggleBtn').querySelector('i').className = 'fas fa-moon'; }
    </script>
</body>
